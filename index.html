<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Transformer Lab</title>

<style>
body {
  margin: 0;
  background: #2b2d31;
  color: white;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  height: 100vh;
}

.box {
  padding: 10px;
  border: 1px solid #444;
}

textarea {
  width: 100%;
  height: 80%;
  background: #1e1f22;
  color: white;
  border: none;
  padding: 10px;
  resize: none;
  font-size: 16px;
}

#output {
  white-space: pre-wrap;
  background: #1e1f22;
  padding: 10px;
  height: 80%;
  overflow: auto;
}

.controls {
  grid-column: span 2;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px;
  background: #232428;
  align-items: center;
}

button, select {
  padding: 8px;
  background: #5865f2;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #4752c4;
}
</style>
</head>

<body>

<div class="container">

  <!-- INPUT -->
  <div class="box">
    <h3>Input</h3>
    <textarea id="input"></textarea>
  </div>

  <!-- OUTPUT -->
  <div class="box">
    <h3>Output</h3>
    <div id="output"></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">

    <button onclick="transform('uwu')">Uwufy рЯШЇ</button>
    <button onclick="transform('formal')">Formal рЯО©</button>
    <button onclick="transform('chaos')">CHAOS рЯФ•</button>
    <button onclick="transform('short')">Short вЬВпЄП</button>

    <button onclick="transform('robot')">Robot рЯ§Ц</button>
    <button onclick="transform('pirate')">Pirate рЯПівАНвШ†пЄП</button>
    <button onclick="transform('genz')">Gen Z рЯІҐ</button>
    <button onclick="transform('reverse')">Reverse рЯФБ</button>
    <button onclick="transform('whisper')">Whisper рЯ§Ђ</button>

    <select onchange="setFont(this.value)">
      <option value="discord">Discord</option>
      <option value="clean">Clean</option>
      <option value="mono">Mono</option>
      <option value="fun">Fun</option>
    </select>

  </div>

</div>

<script>
const input = document.getElementById("input");
const output = document.getElementById("output");

function transform(type) {
  let text = input.value;

  if (type === "uwu") {
    text = text
      .replace(/r|l/g, "w")
      .replace(/R|L/g, "W") + " uwu рЯШЇ";
  }

  if (type === "formal") {
    text = "Dear user,\n\n" + text + "\n\nKind regards.\nрЯУ©";
  }

  // рЯФ• CHAOS MODE (upgraded)
  if (type === "chaos") {
    const emojis = ["рЯФ•","рЯТА","рЯШВ","рЯІ†","вЪ°","рЯСБпЄП","рЯТ•","вЬ®","рЯ§Ц","рЯМА","рЯСЊ","рЯТ£","рЯ™Р"];
    const ascii = [
      "(вХѓ¬∞вЦ°¬∞пЉЙвХѓпЄµ вФївФБвФї",
      "¬ѓ\\_(гГД)_/¬ѓ",
      "аЉЉ гБ§ вЧХ_вЧХ аЉљгБ§",
      "<(o_o<)",
      "(вМРвЦ†_вЦ†)",
      "вЦИвЦАвЦИ вЦИвЦДвЦИ вЦАвЦИвЦА"
    ];

    let chaotic = text
      .split("")
      .map(c => {
        if (Math.random() < 0.25) return emojis[Math.floor(Math.random() * emojis.length)];
        if (Math.random() < 0.15) return c.toUpperCase();
        return c;
      })
      .join("");

    chaotic += "\n\n" + ascii[Math.floor(Math.random() * ascii.length)];
    chaotic += "\n" + emojis.sort(() => 0.5 - Math.random()).slice(0, 10).join(" ");

    text = chaotic;
  }

  if (type === "short") {
    text = text.split(" ").slice(0, 5).join(" ") + "...";
  }

  if (type === "robot") {
    text = text
      .toUpperCase()
      .replace(/A/g, "4")
      .replace(/E/g, "3")
      .replace(/I/g, "1")
      .replace(/O/g, "0")
      + "\n[ SYSTEM ACTIVE ] рЯ§Ц";
  }

  if (type === "pirate") {
    text = "рЯПівАНвШ†пЄП Arrr!\n" + text
      .replace(/my/g, "me")
      .replace(/is/g, "be")
      + "\nвЪУ Yarr!";
  }

  if (type === "genz") {
    text = text
      .replace(/really/g, "fr")
      .replace(/very/g, "lowkey")
      .replace(/amazing/g, "no cap amazing")
      + " рЯТА fr fr";
  }

  if (type === "reverse") {
    text = text.split("").reverse().join("");
  }

  if (type === "whisper") {
    text = text.toLowerCase() + "..." + " рЯ§Ђ";
  }

  output.innerText = text;
}

function setFont(type) {
  if (type === "discord") {
    document.body.style.fontFamily =
      '"Helvetica Neue", Helvetica, Arial, sans-serif';
  }

  if (type === "clean") {
    document.body.style.fontFamily = "Arial, sans-serif";
  }

  if (type === "mono") {
    document.body.style.fontFamily = '"Courier New", monospace';
  }

  if (type === "fun") {
    document.body.style.fontFamily = '"Comic Sans MS", cursive';
  }
}
</script>

</body>
</html>
